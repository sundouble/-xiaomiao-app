plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xiaomiao.assistant'
    compileSdk 34

    defaultConfig {
        applicationId "com.xiaomiao.assistant"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile rootProject.file('xiaomiao.keystore')
            storePassword 'xiaomiao123'
            keyAlias 'xiaomiao'
            keyPassword 'xiaomiao123'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
